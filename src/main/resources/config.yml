# Multi-language configuration note
# All language config files are stored in the languages folder.
# To switch language, copy your desired config file from the languages folder to the main plugin directory and rename it to config.yml (overwrite the original file).
# For example: copy languages/config-zh_tw.yml to config.yml to switch to Traditional Chinese.

# Item required when using a warp point (set to none if not required)
use-item: ENDER_PEARL
# Number of items consumed when using a warp point
use-cost: 1
# Waiting time before teleportation (unit: seconds)
teleport-delay: 5
# Cooldown after teleportation is completed (unit: seconds)
teleport-use-cooldown: 10
# Leash related settings
enable-recursive-leash: true  # Enable recursive leash function
max-leash-depth: 5           # Maximum leash depth (to prevent excessively long leash chains)

# Cross-dimension teleport settings
cross-dimension-teleport:
  # Allow cross-dimension teleportation (true allows, false disables)
  enabled: true
  # Allow OPs to bypass cross-dimension restrictions (true allows, false disables)
  op-bypass: true
# Group function related settings
warp-groups:
  # Enable group function (true enables, false disables)
  enabled: true
  # Maximum number of groups each player can create (OPs are not limited)
  max-groups-per-player: 5
  # Maximum number of warps per group (OPs are not limited)
  max-warps-per-group: 10
  # Maximum number of members per group (OPs are not limited)
  max-members-per-group: 20
  # Allow normal players to use group functions (true allows, false only for OP)
  allow-normal-players: true


###############################################################################
# The following settings affect only the creation of Warp Target (WPT) signs
###############################################################################
# Item required to create Warp Target sign (set to none if not required)
create-wpt-item: DIAMOND_SWORD
# Number of items consumed when creating Warp Target sign
create-wpt-item-cost: 1
# Maximum number of warp points each player can create (-1 means unlimited)
max-warps-per-player: 10
# OPs are not limited in the number of warps they can create (true means unlimited for OP)
op-unlimited-warps: true
# Default visibility of warp points (true for private, false for public)
default-visibility: false
# Display creator info on the WPT sign (true displays, false does not display)
show-creator-on-sign: true

